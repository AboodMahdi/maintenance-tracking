<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تتبع طلب الصيانة</title>
  <script type="module" src="./script.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 40px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      text-align: right;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>تتبع طلب الصيانة</h2>

    <input id="orderNumber" placeholder="ادخل رقم الطلب" />
    <br/>
    <button onclick="trackOrder()">تتبع</button>

    <div id="result" class="result"></div>
  </div>
</body>
</html>
